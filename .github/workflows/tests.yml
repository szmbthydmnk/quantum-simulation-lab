name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
      # Downloads your code
        uses: actions/checkout@v4

      - name: Set up Python
      # Provides Python in the runner
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies and package
        run: |
          python -m pip install --upgrade pip
          # Install your package (this will also install numpy, scipy, pytest from pyproject.toml)
          pip install -e .

      - name: Run tests
        run: pytest
