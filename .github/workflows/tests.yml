name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'  # or match your local version

      - name: Install dependencies and package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff
      
      - name: Run lint
        run: ruff check tensor_network_library tests examples

      - name: Run tests
        run: pytest
