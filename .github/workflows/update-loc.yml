name: Update lines of code in README

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"

permissions:
  contents: write

jobs:
  count-loc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Count lines of code
        id: loc
        shell: bash
        run: |
          LOC=$(git ls-files '*.py' | xargs -r cat | sed '/^\s*$/d' | wc -l)
          echo "loc=$LOC" >> "$GITHUB_OUTPUT"

      - name: Update README with LOC
        shell: bash
        env:
          LOC: ${{ steps.loc.outputs.loc }}
        run: |
          tmpfile=$(mktemp)
          awk -v loc="$LOC" '
            /<!-- LOC-AUTO-START -->/ {
              print;
              print loc;
              skip=1;
              next
            }
            /<!-- LOC-AUTO-END -->/ {
              skip=0
            }
            !skip { print }
          ' README.md > "$tmpfile"
          mv "$tmpfile" README.md

      - name: Commit README update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update lines of code in README"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
