name: Auto-tag and publish on merge to main

on:
  push:
    branches:
      - main

jobs:
  auto-tag-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools

      - name: Compute next patch version
        id: version
        run: |
          LATEST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -n1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest tag: $LATEST"
          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}"
          echo "Next tag: $NEXT_TAG"
          echo "tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          echo "version=${MAJOR}.${MINOR}.${NEXT_PATCH}" >> "$GITHUB_OUTPUT"

      - name: Update version in pyproject.toml
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'EOF'
          import re, pathlib, os
          new_version = os.environ["NEW_VERSION"]
          p = pathlib.Path("pyproject.toml")
          content = p.read_text()
          content = re.sub(r'^version = ".*"', f'version = "{new_version}"', content, flags=re.MULTILINE)
          p.write_text(content)
          print("Updated pyproject.toml:")
          print(content)
          EOF

      - name: Verify pyproject.toml
        run: |
          python - <<'EOF'
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          name = data["project"]["name"]
          version = data["project"]["version"]
          print(f"name={name!r}  version={version!r}")
          assert name, "name is empty"
          assert version, "version is empty"
          EOF

      - name: Build package
        run: python -m build

      - name: Inspect wheel metadata
        run: |
          python - <<'EOF'
          import zipfile, pathlib, sys
          wheels = list(pathlib.Path("dist").glob("*.whl"))
          if not wheels:
              print("ERROR: no wheel found in dist/")
              sys.exit(1)
          with zipfile.ZipFile(wheels[0]) as zf:
              meta = [n for n in zf.namelist() if n.endswith("METADATA")]
              if not meta:
                  print("ERROR: no METADATA file in wheel")
                  sys.exit(1)
              content = zf.read(meta[0]).decode()
              for line in content.splitlines()[:10]:
                  print(line)
          EOF

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.version.outputs.tag }} [skip ci]"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin main --follow-tags

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.10.3
